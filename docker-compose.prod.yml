version: '3.8'

# Production Docker Compose Configuration
# Use: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Copy .env.example to .env and fill in all production values
#   - Build the images: docker compose -f docker-compose.prod.yml build
#   - Run migrations: docker compose -f docker-compose.prod.yml run --rm server npx prisma migrate deploy

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-dashboard-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    # Do NOT expose port 5432 to host in production
    # Access via internal network only

  # ── Node.js Backend ────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: ai-dashboard-server-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-google/gemini-flash-1.5}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── React Frontend ─────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api}
    container_name: ai-dashboard-client-prod
    restart: always
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - external

  # ── Ollama Local LLM (optional) ────────────────────────────────────────────
  # Uncomment this block if you want Ollama running inside Docker.
  # Requires NVIDIA GPU runtime for GPU acceleration.
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ai-dashboard-ollama-prod
  #   restart: always
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - internal
  #   # For NVIDIA GPU:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

volumes:
  postgres_data:
    name: ai-dashboard-postgres-data-prod
  # ollama_data:
  #   name: ai-dashboard-ollama-data-prod

networks:
  internal:
    name: ai-dashboard-internal
    internal: true
  external:
    name: ai-dashboard-external
