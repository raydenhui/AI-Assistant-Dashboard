services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_dashboard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ai_dashboard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_dashboard} -d ${POSTGRES_DB:-ai_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Database Management UI (optional, for development)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-dashboard-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ai-dashboard.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev-tools

volumes:
  postgres_data:
    name: ai-dashboard-postgres-data
  pgadmin_data:
    name: ai-dashboard-pgadmin-data

networks:
  default:
    name: ai-dashboard-network
